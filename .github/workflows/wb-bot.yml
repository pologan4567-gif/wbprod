name: WB Telegram Bot (polling)
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
concurrency:
  group: telegram-bot
  cancel-in-progress: true
jobs:
  run-bot:
    name: Telegram Bot
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: pip install python-telegram-bot==21.9 httpx==0.27.2
      - name: Run bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          ALLOWED_USER_ID: ${{ secrets.ALLOWED_USER_ID }}
          WB_API_TOKEN: ${{ secrets.WB_API_TOKEN }}
        run: python bot.py
